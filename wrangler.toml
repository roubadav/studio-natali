name = "studio-natali-hono"
main = "src/index.tsx"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./public" }

# Custom domain routes
routes = [
  { pattern = "studionatali-ricany.cz/*", zone_name = "studionatali-ricany.cz" },
  { pattern = "www.studionatali-ricany.cz/*", zone_name = "studionatali-ricany.cz" }
]

[vars]
JWT_SECRET = "studio-natali-secret-key-change-in-production"
APP_URL = "https://studionatali-ricany.cz"
# Shared sender identity (external API + Cloudflare fallback)
EMAIL_FROM = "Studio Natali <info@studionatali-ricany.cz>"
EMAIL_API_URL = "https://vercel-mail-hub.vercel.app/api/v1/send"
EMAIL_API_ORIGIN = "https://studionatali-ricany.cz"
# Legacy SMTP configuration (optional compatibility)
SMTP_HOST = "smtp.seznam.cz"
SMTP_PORT = "465"
SMTP_USER = "info@studionatali-ricany.cz"
SMTP_FROM = "Studio Natali <info@studionatali-ricany.cz>"
# SMTP_PASS is set via: npx wrangler secret put SMTP_PASS
# EMAIL_API_KEY is set via: npx wrangler secret put EMAIL_API_KEY

[[send_email]]
name = "MAILER"

[[d1_databases]]
binding = "DB"
database_name = "studio-natali-db"
database_id = "a9332a2a-84e4-444d-8889-1b78a4b32e31"
